<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispatcher Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <script>requireAuth();</script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Dispatcher</h2>
      <nav>
        <a href="index.html">Orders</a>
        <a href="drivers.html">Drivers</a>
      </nav>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </aside>

    <main class="main-content">
      <h1>Orders</h1>

      <div class="stats-grid">
        <div class="stat-card">
          <p class="stat-title">Total Orders</p>
          <h3 id="totalOrders">0</h3>
        </div>

        <div class="stat-card">
          <p class="stat-title">Pending Orders</p>
          <h3 id="pendingOrders">0</h3>
        </div>

        <div class="stat-card">
          <p class="stat-title">Delivered Orders</p>
          <h3 id="deliveredOrders">0</h3>
        </div>

        <div class="stat-card">
          <p class="stat-title">Available Drivers</p>
          <h3 id="availableDrivers">0</h3>
        </div>
      </div>

      <div class="filters-bar">
        <input
          type="text"
          id="searchOrder"
          placeholder="Search by order number"
        />

        <select id="statusFilter">
          <option value="">All statuses</option>
          <option value="PENDING">PENDING</option>
          <option value="ASSIGNED">ASSIGNED</option>
          <option value="PICKED_UP">PICKED_UP</option>
          <option value="OUT_FOR_DELIVERY">OUT_FOR_DELIVERY</option>
          <option value="DELIVERED">DELIVERED</option>
          <option value="CANCELLED">CANCELLED</option>
        </select>

        <select id="cityFilter">
          <option value="">All cities</option>
        </select>
      </div>

      <div class="table-container">
        <table id="ordersTable">
          <thead>
            <tr>
              <th>Order #</th>
              <th>Customer</th>
              <th>City</th>
              <th>Total</th>
              <th>Financial Status</th>
              <th>Order Status</th>
              <th>Assigned Driver</th>
              <th>Assign Driver</th>
              <th>Update Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="js/orders.js"></script>
</body>
</html>
