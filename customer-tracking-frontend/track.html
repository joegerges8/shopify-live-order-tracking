<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Your Order</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f9fafb;
    }

    /* ── Map ── */
    #map { flex: 1; width: 100%; }

    /* ── Status card ── */
    #status-card {
      background: #ffffff;
      border-radius: 24px 24px 0 0;
      padding: 12px 20px 36px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
    }

    .handle {
      width: 36px;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    /* Live badge */
    .live-badge {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: #16a34a;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }
    .live-badge.show { display: flex; }
    .live-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(1.4); }
    }

    /* Headline + ETA */
    #status-headline {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 2px;
    }
    #eta-text {
      font-size: 14px;
      color: #6b7280;
      min-height: 18px;
      margin-bottom: 14px;
    }

    /* ── Progress steps ── */
    .progress-track {
      display: flex;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 62px;
      flex-shrink: 0;
    }

    .step-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #9ca3af;
      transition: all 0.35s ease;
    }
    .step-dot.done   { background: #111827; border-color: #111827; color: #fff; }
    .step-dot.active { background: #111827; border-color: #111827; color: #fff; box-shadow: 0 0 0 5px rgba(17,24,39,0.12); }

    .step-label {
      font-size: 9px;
      color: #9ca3af;
      font-weight: 500;
      text-align: center;
      line-height: 1.3;
    }
    .step-label.done   { color: #6b7280; }
    .step-label.active { color: #111827; font-weight: 700; }

    .step-connector {
      flex: 1;
      height: 2px;
      background: #e5e7eb;
      margin-top: 12px;
      transition: background 0.35s ease;
    }
    .step-connector.done { background: #111827; }

    /* ── Driver row ── */
    .driver-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid #f3f4f6;
    }

    .driver-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .driver-info { flex: 1; overflow: hidden; }

    #driver-name {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #driver-phone {
      font-size: 13px;
      color: #6b7280;
      margin-top: 2px;
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 1000;
    }
    #loading.hidden { display: none; }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid #e5e7eb;
      border-top-color: #111827;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Delivered overlay ── */
    #delivered-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      align-items: center;
      justify-content: center;
      z-index: 999;
      backdrop-filter: blur(3px);
    }
    #delivered-overlay.show { display: flex; }

    .delivered-card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      width: 88%;
      max-width: 340px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
    }
    .delivered-icon {
      width: 80px;
      height: 80px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 38px;
    }
    .delivered-card h2 { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    .delivered-card p  { font-size: 14px; color: #6b7280; line-height: 1.5; }

    /* ── Error ── */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 32px;
      z-index: 1000;
    }
    #error-screen.show { display: flex; }
    #error-screen .icon { font-size: 56px; margin-bottom: 4px; }
    #error-screen h2   { font-size: 22px; font-weight: 700; color: #111827; }
    #error-screen p    { font-size: 14px; color: #6b7280; line-height: 1.6; }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p style="color:#6b7280;font-size:14px;">Loading your delivery...</p>
  </div>

  <div id="map"></div>

  <div id="status-card">
    <div class="handle"></div>

    <div id="live-badge" class="live-badge">
      <span class="live-dot"></span> LIVE
    </div>

    <div id="status-headline">Loading...</div>
    <div id="eta-text"></div>

    <div class="progress-track">
      <div class="step">
        <div class="step-dot" id="step-0">✓</div>
        <div class="step-label" id="step-0-lbl">Placed</div>
      </div>
      <div class="step-connector" id="conn-0"></div>
      <div class="step">
        <div class="step-dot" id="step-1">2</div>
        <div class="step-label" id="step-1-lbl">Driver</div>
      </div>
      <div class="step-connector" id="conn-1"></div>
      <div class="step">
        <div class="step-dot" id="step-2">3</div>
        <div class="step-label" id="step-2-lbl">Picked Up</div>
      </div>
      <div class="step-connector" id="conn-2"></div>
      <div class="step">
        <div class="step-dot" id="step-3">4</div>
        <div class="step-label" id="step-3-lbl">Delivered</div>
      </div>
    </div>

    <div class="driver-row">
      <div class="driver-avatar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="36" height="36">
          <circle cx="20" cy="14" r="8" fill="#6b7280"/>
          <path d="M4 36 Q4 26 20 26 Q36 26 36 36" fill="#6b7280"/>
        </svg>
      </div>
      <div class="driver-info">
        <div id="driver-name">Waiting for driver...</div>
        <div id="driver-phone"></div>
      </div>
    </div>
  </div>

  <div id="delivered-overlay">
    <div class="delivered-card">
      <div class="delivered-icon">✅</div>
      <h2>Order Delivered!</h2>
      <p>Your order has been successfully delivered. Enjoy!</p>
    </div>
  </div>

  <div id="error-screen">
    <div class="icon">🔍</div>
    <h2>Tracking link not found</h2>
    <p>This link may be invalid or has expired.<br>Please contact the store for help.</p>
  </div>

  <!-- Socket.io client — must load before the inline script -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    const API_BASE = window.location.origin;
    const token   = new URLSearchParams(window.location.search).get('token');

    // Map state
    let map               = null;
    let driverMarker      = null;
    let destMarker        = null;
    let directionsService = null;
    let directionsRenderer= null;
    let prevDriverPos     = null;
    let currentBearing    = 0;
    let animFrame         = null;
    let lastEtaFetch      = 0;
    let currentData       = null;
    let pollInterval      = null;

    // ── Socket.io ──────────────────────────────────────────────────────────

    let socket = null;
    if (token) {
      socket = io(API_BASE, {
        query: { token },
        transports: ['websocket', 'polling'],
      });

      socket.on('location_update', ({ latitude, longitude, updated_at }) => {
        if (!currentData) return;
        currentData.driver_location = { latitude, longitude, updated_at };
        applyMapData(currentData);
        fetchETA();
      });

      socket.on('status_update', ({ status }) => {
        if (!currentData) return;
        currentData.order_status = status;
        applyCardData(currentData);
        if (status === 'DELIVERED') cleanup();
      });
    }

    // ── Utilities ──────────────────────────────────────────────────────────

    function showError() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error-screen').classList.add('show');
    }

    function hideLoading() {
      document.getElementById('loading').classList.add('hidden');
    }

    function cleanup() {
      document.getElementById('delivered-overlay').classList.add('show');
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      if (socket) { socket.disconnect(); socket = null; }
    }

    // ── Status helpers ─────────────────────────────────────────────────────

    function headlineFor(status) {
      return {
        PENDING:          'Looking for a driver...',
        ASSIGNED:         'Driver is heading to pickup',
        PICKED_UP:        'Order picked up!',
        OUT_FOR_DELIVERY: 'Driver is on the way!',
        DELIVERED:        'Order delivered!',
        CANCELLED:        'Order cancelled',
      }[status] || status;
    }

    function stepIndex(status) {
      return { PENDING: 0, ASSIGNED: 1, PICKED_UP: 2, OUT_FOR_DELIVERY: 2, DELIVERED: 3, CANCELLED: 0 }[status] ?? 0;
    }

    function updateProgressSteps(status) {
      const active  = stepIndex(status);
      const allDone = status === 'DELIVERED';

      for (let i = 0; i < 4; i++) {
        const dot   = document.getElementById(`step-${i}`);
        const label = document.getElementById(`step-${i}-lbl`);
        const isDone   = allDone || i === 0 || i < active;
        const isActive = !allDone && i === active && i > 0;

        dot.className   = 'step-dot'   + (isDone ? ' done' : isActive ? ' active' : '');
        label.className = 'step-label' + (isDone ? ' done' : isActive ? ' active' : '');
        dot.textContent = isDone ? '✓' : String(i + 1);
      }

      for (let i = 0; i < 3; i++) {
        document.getElementById(`conn-${i}`).className =
          'step-connector' + (allDone || i < active ? ' done' : '');
      }
    }

    // ── Car SVG marker ─────────────────────────────────────────────────────

    function makeCarIcon(rotation) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
        <g transform="rotate(${rotation} 32 32)">
          <!-- Drop shadow -->
          <ellipse cx="32" cy="55" rx="13" ry="4" fill="rgba(0,0,0,0.18)"/>
          <!-- Body -->
          <path d="M22 8 Q32 5 42 8 L44 16 L45 42 Q45 52 32 54 Q19 52 19 42 L20 16 Z" fill="#1d4ed8"/>
          <!-- Hood panel -->
          <path d="M23 8 Q32 5.5 41 8 L43 15 L38 18 Q32 16 26 18 L21 15 Z" fill="#2563eb"/>
          <!-- Windshield -->
          <path d="M26 18 Q32 16 38 18 L39 28 Q32 26 25 28 Z" fill="#bfdbfe" opacity="0.9"/>
          <!-- Cabin roof -->
          <rect x="25" y="28" width="14" height="12" rx="1" fill="#1e3a8a"/>
          <!-- Rear window -->
          <path d="M26 40 Q32 41.5 38 40 L39 48 Q32 50 25 48 Z" fill="#bfdbfe" opacity="0.75"/>
          <!-- Trunk -->
          <path d="M23 48 Q32 50.5 41 48 L43 54 Q32 57 21 54 Z" fill="#1d4ed8"/>
          <!-- Left mirror -->
          <path d="M20 20 L15 22 L15 25 L19 24 Z" fill="#1d4ed8"/>
          <!-- Right mirror -->
          <path d="M44 20 L49 22 L49 25 L45 24 Z" fill="#1d4ed8"/>
          <!-- Headlights left -->
          <rect x="22" y="6"  width="6" height="4" rx="1.5" fill="#fef9c3"/>
          <!-- Headlights right -->
          <rect x="36" y="6"  width="6" height="4" rx="1.5" fill="#fef9c3"/>
          <!-- Headlight glow left -->
          <rect x="23" y="7"  width="4" height="2" rx="1" fill="#fde047"/>
          <!-- Headlight glow right -->
          <rect x="37" y="7"  width="4" height="2" rx="1" fill="#fde047"/>
          <!-- Taillights left -->
          <rect x="22" y="53" width="6" height="4" rx="1.5" fill="#991b1b"/>
          <!-- Taillights right -->
          <rect x="36" y="53" width="6" height="4" rx="1.5" fill="#991b1b"/>
          <!-- Taillight glow left -->
          <rect x="23" y="54" width="4" height="2" rx="1" fill="#ef4444"/>
          <!-- Taillight glow right -->
          <rect x="37" y="54" width="4" height="2" rx="1" fill="#ef4444"/>
          <!-- Wheel FL -->
          <rect x="11" y="14" width="8" height="13" rx="3" fill="#111827"/>
          <rect x="13" y="16" width="4" height="9"  rx="1.5" fill="#374151"/>
          <circle cx="15" cy="20.5" r="2" fill="#6b7280"/>
          <!-- Wheel FR -->
          <rect x="45" y="14" width="8" height="13" rx="3" fill="#111827"/>
          <rect x="47" y="16" width="4" height="9"  rx="1.5" fill="#374151"/>
          <circle cx="49" cy="20.5" r="2" fill="#6b7280"/>
          <!-- Wheel RL -->
          <rect x="11" y="37" width="8" height="13" rx="3" fill="#111827"/>
          <rect x="13" y="39" width="4" height="9"  rx="1.5" fill="#374151"/>
          <circle cx="15" cy="43.5" r="2" fill="#6b7280"/>
          <!-- Wheel RR -->
          <rect x="45" y="37" width="8" height="13" rx="3" fill="#111827"/>
          <rect x="47" y="39" width="4" height="9"  rx="1.5" fill="#374151"/>
          <circle cx="49" cy="43.5" r="2" fill="#6b7280"/>
        </g>
      </svg>`;
      return {
        url: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
        scaledSize: new google.maps.Size(64, 64),
        anchor:     new google.maps.Point(32, 32),
      };
    }

    // ── Bearing ────────────────────────────────────────────────────────────

    function calcBearing(from, to) {
      const dLng = (to.lng - from.lng) * Math.PI / 180;
      const φ1   = from.lat * Math.PI / 180;
      const φ2   = to.lat  * Math.PI / 180;
      const y    = Math.sin(dLng) * Math.cos(φ2);
      const x    = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(dLng);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    // ── Smooth marker animation ────────────────────────────────────────────

    function animateMarker(marker, from, to, duration) {
      if (animFrame) cancelAnimationFrame(animFrame);

      if (prevDriverPos) {
        currentBearing = calcBearing(prevDriverPos, to);
        marker.setIcon(makeCarIcon(currentBearing));
      }

      const start = performance.now();
      function step(now) {
        const raw  = (now - start) / duration;
        const t    = Math.min(raw, 1);
        const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        marker.setPosition({
          lat: from.lat + (to.lat - from.lat) * ease,
          lng: from.lng + (to.lng - from.lng) * ease,
        });
        if (t < 1) animFrame = requestAnimationFrame(step);
      }
      animFrame = requestAnimationFrame(step);
    }

    // ── ETA via DirectionsService ──────────────────────────────────────────

    function fetchETA() {
      if (!directionsService || !currentData) return;
      const loc      = currentData.driver_location;
      const isActive = ['PICKED_UP', 'OUT_FOR_DELIVERY'].includes(currentData.order_status);
      if (!loc || !isActive || currentData.customer_latitude == null) return;
      if (Date.now() - lastEtaFetch < 30_000) return;
      lastEtaFetch = Date.now();

      directionsService.route({
        origin:      { lat: Number(loc.latitude),                  lng: Number(loc.longitude) },
        destination: { lat: Number(currentData.customer_latitude), lng: Number(currentData.customer_longitude) },
        travelMode:  google.maps.TravelMode.DRIVING,
      }, (result, status) => {
        if (status !== google.maps.DirectionsStatus.OK) return;
        directionsRenderer.setMap(map);
        directionsRenderer.setDirections(result);
        const duration = result.routes[0]?.legs[0]?.duration?.text;
        document.getElementById('eta-text').textContent = duration ? `~${duration} away` : '';
      });
    }

    // ── Apply map data ─────────────────────────────────────────────────────

    function applyMapData(data) {
      if (!map) return;

      const isActive = ['PICKED_UP', 'OUT_FOR_DELIVERY'].includes(data.order_status);

      // Destination marker (home pin)
      if (data.customer_latitude != null && data.customer_longitude != null && !destMarker) {
        const destPos = { lat: Number(data.customer_latitude), lng: Number(data.customer_longitude) };
        destMarker = new google.maps.Marker({
          position: destPos,
          map,
          title: 'Delivery address',
          icon: {
            path:        google.maps.SymbolPath.CIRCLE,
            scale:       10,
            fillColor:   '#22c55e',
            fillOpacity: 1,
            strokeColor: '#fff',
            strokeWeight: 3,
          },
          zIndex: 5,
        });
        if (!data.driver_location || !isActive) {
          map.setCenter(destPos);
          map.setZoom(15);
        }
      }

      // Driver marker (car icon)
      if (data.driver_location && isActive) {
        const newPos = {
          lat: Number(data.driver_location.latitude),
          lng: Number(data.driver_location.longitude),
        };

        if (!driverMarker) {
          driverMarker = new google.maps.Marker({
            position: newPos,
            map,
            title:  'Driver',
            icon:   makeCarIcon(0),
            zIndex: 10,
          });
          prevDriverPos = newPos;

          // Fit both driver and destination in view
          if (destMarker) {
            const bounds = new google.maps.LatLngBounds();
            bounds.extend(newPos);
            bounds.extend(destMarker.getPosition());
            map.fitBounds(bounds, { top: 60, right: 60, bottom: 260, left: 60 });
          } else {
            map.setCenter(newPos);
          }
        } else {
          animateMarker(driverMarker, prevDriverPos || newPos, newPos, 1200);
          prevDriverPos = newPos;
        }
      } else if (driverMarker && !isActive) {
        driverMarker.setMap(null);
        driverMarker = null;
        prevDriverPos = null;
        directionsRenderer.setMap(null);
      }
    }

    // ── Apply card data ────────────────────────────────────────────────────

    function applyCardData(data) {
      const status   = data.order_status;
      const isActive = ['PICKED_UP', 'OUT_FOR_DELIVERY'].includes(status);

      document.getElementById('status-headline').textContent = headlineFor(status);
      document.getElementById('live-badge').className =
        'live-badge' + (isActive && data.driver_location ? ' show' : '');

      if (!isActive) document.getElementById('eta-text').textContent = '';

      updateProgressSteps(status);

      document.getElementById('driver-name').textContent =
        data.driver ? data.driver.name : 'Waiting for driver...';
      document.getElementById('driver-phone').textContent =
        data.driver && data.driver.phone ? data.driver.phone : '';

      if (status === 'DELIVERED') cleanup();
    }

    // ── Fetch tracking data (initial + fallback polling) ───────────────────

    async function fetchTracking() {
      try {
        const res = await fetch(`${API_BASE}/api/track/${token}`);
        if (res.status === 404) { showError(); return; }
        if (!res.ok) return;
        const data = await res.json();
        currentData = data;
        applyCardData(data);
        applyMapData(data);
        if (data.driver_location && ['PICKED_UP', 'OUT_FOR_DELIVERY'].includes(data.order_status)) {
          fetchETA();
        }
      } catch (_) {
        // Network error — keep polling silently
      }
    }

    // ── Bootstrap ──────────────────────────────────────────────────────────

    (async () => {
      if (!token) { showError(); return; }
      await fetchTracking();
      hideLoading();
      // Slower poll as safety net — socket handles real-time updates
      pollInterval = setInterval(fetchTracking, socket ? 30_000 : 10_000);
    })();

    // ── Google Maps init callback ──────────────────────────────────────────

    window.initTrackingMap = function () {
      map = new google.maps.Map(document.getElementById('map'), {
        zoom:             14,
        center:           { lat: 33.8938, lng: 35.5018 },
        disableDefaultUI: true,
        zoomControl:      true,
        gestureHandling:  'greedy',
        styles: [
          { featureType: 'poi',     stylers: [{ visibility: 'off' }] },
          { featureType: 'transit', stylers: [{ visibility: 'off' }] },
          { featureType: 'road', elementType: 'labels.icon', stylers: [{ visibility: 'off' }] },
        ],
      });

      directionsService  = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({
        suppressMarkers: true,
        polylineOptions: {
          strokeColor:   '#4f46e5',
          strokeWeight:  5,
          strokeOpacity: 0.85,
        },
      });

      if (currentData) applyMapData(currentData);
    };
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAriVJnIv8YZpcpQOIUy-4f3Tb1i0RTfAg&callback=initTrackingMap"
    async defer>
  </script>

</body>
</html>
